services:
  mysql:
    platform: linux/x86_64
    image: mysql:5.6
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: codecamp
      TZ: Asia/Kolkata

volumes:
  mysqldata:
    driver: local